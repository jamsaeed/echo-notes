{% extends 'base.html' %}

{% block content %}

<div class="signup-wrapper">
<h1 class="signup-h1">Sign Up</h1>
{% if error_message %}
<p class="red-text">{{error_message}}</p>
{% endif %}

<form action="{% url 'signup' %}">
{% csrf_token %}
{{form.as_p}}
<input type="submit" value="Sign up" class="btn-signup">
</form>
</div>




{% endblock%}
